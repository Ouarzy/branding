name: Publish scheduled posts

on:
  schedule:
    # Toutes les heures entre 7h et 20h UTC (9h-22h Paris)
    - cron: "0 7-20 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (ne publie pas réellement)"
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[publish]"

      - name: Publish due posts
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python -m src.cli publish --dry-run
          else
            python -m src.cli publish
          fi

      - name: Commit status updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/
          git diff --staged --quiet || git commit -m "chore: mark published posts [skip ci]"
          git push
